# SFT 实验配置：scripts/train/sft/run_exp2_sft.sh 调用，实际值由 sh 通过 env 注入到 run_exp2_sft.py
exp:
  name: exp2_sft_baseline_v1

model:
  path: /mnt/data1/zhanyiliu/liuzhanyi/llm_rl/grpo_from_scratch/models/Qwen2.5-1.5B-Instruct

data:
  train_file: data/verl/exp2_sft/train.parquet
  val_file: data/verl/exp2_sft/val.parquet
  max_seq_len: 2048

train:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  num_train_epochs: 3
  learning_rate: 2.0e-5
  warmup_ratio: 0.03
  logging_steps: 10
  save_steps: 50
  eval_steps: 50
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4

logging:
  report_to: wandb
  project: schemashift-grpo
