# Aug-only ablation（E5）：扰动数据 + 标准 GRPO（per-(task,level)），消融 stratified advantage 贡献
#
# 注意：当前 `scripts/train/grpo/run_aug_only.sh` 不会读取本文件，
#       所有训练参数直接由 sh 通过 hydra override 注入到 verl。
#       本 yaml 仅作为参数清单参考，修改后请同步 sh。
exp:
  name: exp5_aug_only_v2   # 与 sh 的默认 EXP_NAME 一致

model:
  path: /mnt/data1/zhanyiliu/liuzhanyi/llm_rl/grpo_from_scratch/models/Qwen2.5-1.5B-Instruct

data:
  # E5 数据：从 E4 parquet 每 task/level 各抽 1 条 (1:1:1)，3 records/task
  # 由 build_parquet.py 重建；run_aug_only.sh 在文件不存在时也会内嵌生成同源数据
  train_file: data/verl/exp5_aug_only/train.parquet
  val_file: data/verl/exp5_aug_only/val.parquet
  max_prompt_length: 10240    # BFCL prompt 实测 p99≈8800（带工具 schema），需 10k+
  max_response_length: 4096

rollout:
  group_size: 3              # E5: 3 records/task × rollout.n=3 → 同 (task, level) 内 3 条 rollout
  max_turns: 10
  agent_loop: bfcl_agent
  agent_loop_config: configs/agent_loop.yaml
  tensor_parallel_size: 1

actor:
  ppo_micro_batch_size_per_gpu: 2
  ppo_epochs: 1
  clip_ratio: 0.2
  use_kl_loss: true
  kl_loss_coef: 0.04
  loss_agg_mode: token-mean
  enable_gradient_checkpointing: true

algorithm:
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true

trainer:
  total_epochs: 1
  total_training_steps: 300
  save_freq: 50
  test_freq: 50
  val_before_train: true
  project_name: schemashift-grpo
