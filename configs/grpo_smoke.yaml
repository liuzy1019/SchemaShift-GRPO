# GRPO Smoke Test 配置 — 快速验证 pipeline 能跑通
# 验收标准：step 1 完成 + loss finite + 无 traceback

model:
  path: outputs/sft_cold_start_4b/final  # SFT 产出权重

data:
  train_file: data/grpo_train.parquet
  val_file: data/grpo_val.parquet

reward:
  function_path: src/reward/schemashift_reward_fn.py

resources:
  n_gpus: 8
  cuda_visible_devices: 0,1,2,3,4,5,6,7

trainer:
  total_steps: 2  # 只跑 2 步，验证链路

optimization:
  lr: 1.0e-6  # smoke 用稍大 lr 加速收敛观察
  lr_warmup_ratio: 0.1
  kl_coef: 0.01
  ppo_epochs: 1
  grad_clip: 1.0

batch:
  train_batch_size: 32
  val_batch_size: 16
  mini_batch_size: 8
  micro_batch_size_per_gpu: 4
  log_prob_micro_batch_size_per_gpu: 4

rollout:
  n: 4
  temperature: 0.7
  top_p: 0.95
  tensor_model_parallel_size: 1
  gpu_memory_utilization: 0.60
  free_cache_engine: true
  enforce_eager: false
  prompt_length: 10240  # 不得低于 10240
  response_length: 1024  # smoke 用较短 response 加速
  max_num_seqs: 64

offload:
  ref_param_offload: false
  actor_param_offload: false

terminal:
  log_mode: compact
  val_examine: 0
  verbose_validation: false
