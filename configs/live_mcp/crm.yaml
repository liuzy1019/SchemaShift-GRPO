# CRM MCP Server 配置
# 客户关系管理：关系型状态，support leads/contacts/deals

name: crm
type: local_subprocess
enabled: true

command:
  argv: ["python", "-m", "src.live_mcp.servers.crm.server"]
  cwd: "."
  env:
    PYTHONUNBUFFERED: "1"

transport:
  kind: stdio
  startup_timeout_s: 20
  request_timeout_s: 10

session:
  reset_mode: deterministic_seed
  max_sessions: 64
  default_seed: 42

tools:
  discovery:
    - list_leads
  readonly:
    - list_leads
    - list_deals
    - get_deal
  mutating:
    - create_lead
    - convert_lead
    - create_contact
    - create_deal
    - update_deal

reward_profile: crm_basic

dependency_graph:
  edges:
    # ── Lead discovery → operations ──
    - source_tool: list_leads
      target_tool: update_lead
      relation: explicit
      source_output_path: leads[].lead_id
      target_argument_path: lead_id
    - source_tool: list_leads
      target_tool: convert_lead
      relation: explicit
      source_output_path: leads[].lead_id
      target_argument_path: lead_id
    - source_tool: list_leads
      target_tool: delete_lead
      relation: explicit
      source_output_path: leads[].lead_id
      target_argument_path: lead_id
    - source_tool: list_leads
      target_tool: add_note
      relation: implicit
      description: note on a lead from listing

    # ── Lead lifecycle ──
    - source_tool: create_lead
      target_tool: update_lead
      relation: explicit
      source_output_path: lead.lead_id
      target_argument_path: lead_id
    - source_tool: create_lead
      target_tool: convert_lead
      relation: explicit
      source_output_path: lead.lead_id
      target_argument_path: lead_id
    - source_tool: create_lead
      target_tool: list_leads
      relation: implicit
      description: verify new lead in listing
    - source_tool: update_lead
      target_tool: list_leads
      relation: implicit
      description: verify updated lead

    # ── Lead → contact → deal pipeline ──
    - source_tool: convert_lead
      target_tool: create_deal
      relation: explicit
      source_output_path: contact.contact_id
      target_argument_path: contact_id

    # ── Contact management ──
    - source_tool: create_contact
      target_tool: update_contact
      relation: explicit
      source_output_path: contact.contact_id
      target_argument_path: contact_id
    - source_tool: update_contact
      target_tool: create_deal
      relation: explicit
      source_output_path: contact_id
      target_argument_path: contact_id

    # ── Deal discovery → detail → operations ──
    - source_tool: list_deals
      target_tool: get_deal
      relation: explicit
      source_output_path: deals[].deal_id
      target_argument_path: deal_id
    - source_tool: list_deals
      target_tool: update_deal
      relation: explicit
      source_output_path: deals[].deal_id
      target_argument_path: deal_id
    - source_tool: create_deal
      target_tool: update_deal
      relation: explicit
      source_output_path: deal.deal_id
      target_argument_path: deal_id
    - source_tool: create_deal
      target_tool: list_deals
      relation: implicit
      description: verify new deal in pipeline
    - source_tool: update_deal
      target_tool: get_deal
      relation: implicit
      description: verify updated deal stage

    # ── Deal → tasks and notes ──
    - source_tool: get_deal
      target_tool: create_task
      relation: implicit
      description: create task for a deal
    - source_tool: get_deal
      target_tool: add_note
      relation: implicit
      description: add note to a deal
    - source_tool: list_tasks
      target_tool: complete_task
      relation: explicit
      source_output_path: tasks[].task_id
      target_argument_path: task_id
    - source_tool: create_task
      target_tool: complete_task
      relation: explicit
      source_output_path: task.task_id
      target_argument_path: task_id

query_templates:
  crm_lead_to_deal:
    - "Find the lead from {company}, convert it to a contact, then create a deal for {amount}."
  crm_update_pipeline:
    - "Find the {stage} deals, then advance the {deal_name} deal to the next stage."
  crm_create_lead:
    - "Create a new lead for {name} at {company} from {source}."

