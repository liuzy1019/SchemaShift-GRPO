# Calendar MCP Server 配置
# 提供日历事件的 CRUD 操作，用于 live MCP 训练/评测

name: calendar
type: local_subprocess
enabled: true

command:
  argv: ["python", "-m", "src.live_mcp.servers.calendar.server"]
  cwd: "."  # 项目根目录
  env:
    PYTHONUNBUFFERED: "1"

transport:
  kind: stdio  # subprocess stdio 通信
  startup_timeout_s: 20  # server 启动超时
  request_timeout_s: 10  # 单次请求超时

session:
  reset_mode: deterministic_seed  # 每次 reset 恢复到确定性初始状态
  max_sessions: 64  # 最大并发 session 数
  default_seed: 42

tools:
  discovery:  # 用于 schema 发现的工具
    - list_events
  readonly:  # 只读工具（不改变状态）
    - list_events
  mutating:  # 写入工具（改变状态）
    - create_event
    - update_event
    - delete_event

reward_profile: calendar_basic  # reward 配置 profile

dependency_graph:
  edges:
    # ── Event discovery → detail ──
    - source_tool: list_events
      target_tool: get_event
      relation: explicit
      source_output_path: events[].event_id
      target_argument_path: event_id
    - source_tool: search_events
      target_tool: get_event
      relation: explicit
      source_output_path: events[].event_id
      target_argument_path: event_id

    # ── Event detail → mutations (explicit ID handoff) ──
    - source_tool: get_event
      target_tool: update_event
      relation: explicit
      source_output_path: event.event_id
      target_argument_path: event_id
    - source_tool: get_event
      target_tool: delete_event
      relation: explicit
      source_output_path: event.event_id
      target_argument_path: event_id
    - source_tool: get_event
      target_tool: add_attendee
      relation: explicit
      source_output_path: event.event_id
      target_argument_path: event_id
    - source_tool: get_event
      target_tool: remove_attendee
      relation: explicit
      source_output_path: event.event_id
      target_argument_path: event_id
    - source_tool: get_event
      target_tool: set_reminder
      relation: explicit
      source_output_path: event.event_id
      target_argument_path: event_id
    - source_tool: get_event
      target_tool: respond_to_event
      relation: explicit
      source_output_path: event.event_id
      target_argument_path: event_id
    - source_tool: get_event
      target_tool: get_recurring_info
      relation: explicit
      source_output_path: event.event_id
      target_argument_path: event_id

    # ── Scheduling → create ──
    - source_tool: get_free_busy
      target_tool: create_event
      relation: implicit
      description: find free slot then schedule
    - source_tool: check_conflicts
      target_tool: create_event
      relation: implicit
      description: verify no conflicts before creating

    # ── Create → verify visibility ──
    - source_tool: create_event
      target_tool: list_events
      relation: implicit
      description: verify new event appears in listing
    - source_tool: create_recurring
      target_tool: list_events
      relation: implicit
      description: verify recurring event instances
    - source_tool: update_event
      target_tool: get_event
      relation: implicit
      description: verify updated fields persisted
    - source_tool: update_event
      target_tool: list_events
      relation: implicit
      description: verify updated event in listing

    # ── Attendee management ──
    - source_tool: add_attendee
      target_tool: get_free_busy
      relation: implicit
      description: check attendee availability after adding
    - source_tool: add_attendee
      target_tool: check_conflicts
      relation: implicit
      description: check conflicts after adding attendee
    - source_tool: remove_attendee
      target_tool: get_free_busy
      relation: implicit
      description: recheck availability after removal

    # ── Export and timezone ──
    - source_tool: list_events
      target_tool: export_calendar
      relation: explicit
      source_output_path: events
      target_argument_path: events
    - source_tool: change_timezone
      target_tool: list_events
      relation: implicit
      description: verify times in new timezone

    # ── Conflict resolution ──
    - source_tool: check_conflicts
      target_tool: update_event
      relation: implicit
      description: resolve conflicts by rescheduling

query_templates:
  calendar_update_existing_event:
    - "Update {title} from {old_time} to {new_time}, then tell me the new time."
