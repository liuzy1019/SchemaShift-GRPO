# Issue Tracker MCP Server 配置
# 任务跟踪系统：工作流状态机，支持严格的 transition 约束

name: issue_tracker
type: local_subprocess
enabled: true

command:
  argv: ["python", "-m", "src.live_mcp.servers.issue_tracker.server"]
  cwd: "."
  env:
    PYTHONUNBUFFERED: "1"

transport:
  kind: stdio
  startup_timeout_s: 20
  request_timeout_s: 10

session:
  reset_mode: deterministic_seed
  max_sessions: 64
  default_seed: 42

tools:
  discovery:
    - list_issues
  readonly:
    - list_issues
    - get_issue
  mutating:
    - create_issue
    - assign_issue
    - transition_issue
    - comment_issue

reward_profile: issue_tracker_basic

dependency_graph:
  edges:
    # ── Issue discovery → detail → operations ──
    - source_tool: list_issues
      target_tool: get_issue
      relation: explicit
      source_output_path: issues[].issue_id
      target_argument_path: issue_id
    - source_tool: list_issues
      target_tool: assign_issue
      relation: explicit
      source_output_path: issues[].issue_id
      target_argument_path: issue_id
    - source_tool: list_issues
      target_tool: transition_issue
      relation: explicit
      source_output_path: issues[].issue_id
      target_argument_path: issue_id
    - source_tool: list_issues
      target_tool: add_to_sprint
      relation: explicit
      source_output_path: issues[].issue_id
      target_argument_path: issue_id

    # ── Issue detail → mutations ──
    - source_tool: get_issue
      target_tool: assign_issue
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: transition_issue
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: comment_issue
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: update_issue
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: add_label
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: remove_label
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: add_watcher
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: remove_watcher
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: create_subtask
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: list_subtasks
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: time_track
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: set_milestone
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: get_issue
      target_tool: add_to_sprint
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id

    # ── Create → triage ──
    - source_tool: create_issue
      target_tool: assign_issue
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: create_issue
      target_tool: add_label
      relation: explicit
      source_output_path: issue.issue_id
      target_argument_path: issue_id
    - source_tool: create_issue
      target_tool: list_issues
      relation: implicit
      description: verify new issue visible

    # ── Workflow transitions ──
    - source_tool: assign_issue
      target_tool: transition_issue
      relation: implicit
      description: assign then advance state
    - source_tool: transition_issue
      target_tool: comment_issue
      relation: implicit
      description: comment on state change
    - source_tool: transition_issue
      target_tool: get_issue
      relation: implicit
      description: verify state change persisted

    # ── Sprint lifecycle ──
    - source_tool: create_sprint
      target_tool: add_to_sprint
      relation: explicit
      source_output_path: sprint.sprint_id
      target_argument_path: sprint_id
    - source_tool: list_sprints
      target_tool: add_to_sprint
      relation: explicit
      source_output_path: sprints[].sprint_id
      target_argument_path: sprint_id
    - source_tool: add_to_sprint
      target_tool: list_issues
      relation: implicit
      description: verify sprint assignment
    - source_tool: add_to_sprint
      target_tool: remove_from_sprint
      relation: explicit
      source_output_path: issue_id
      target_argument_path: issue_id

    # ── Time tracking ──
    - source_tool: time_track
      target_tool: get_time_report
      relation: implicit
      description: log time then view report
    - source_tool: get_issue
      target_tool: get_time_report
      relation: implicit
      description: view issue then check time spent

query_templates:
  issue_tracker_assign_and_start:
    - "Find the open {priority} priority issue about {title}, assign it to {assignee}, then move it to in_progress."
  issue_tracker_resolve:
    - "Find {assignee}'s in_progress issues, then move the {title} issue through review to resolved."
  issue_tracker_bug_report:
    - "Create a new high priority issue titled '{title}' and assign it to a developer."

