# Filesystem MCP Server 配置
# 文件系统：deepest state，支持路径导航和权限管理

name: filesystem
type: local_subprocess
enabled: true

command:
  argv: ["python", "-m", "src.live_mcp.servers.filesystem.server"]
  cwd: "."
  env:
    PYTHONUNBUFFERED: "1"

transport:
  kind: stdio
  startup_timeout_s: 20
  request_timeout_s: 10

session:
  reset_mode: deterministic_seed
  max_sessions: 64
  default_seed: 42

tools:
  discovery:
    - ls
  readonly:
    - ls
    - pwd
    - cat
  mutating:
    - cd
    - mkdir
    - touch
    - mv
    - cp
    - rm
    - chmod

reward_profile: filesystem_basic

dependency_graph:
  edges:
    # ── Navigation loop ──
    - source_tool: ls
      target_tool: cd
      relation: implicit
      description: list directory then navigate in
    - source_tool: cd
      target_tool: ls
      relation: implicit
      description: navigate then list contents
    - source_tool: cd
      target_tool: pwd
      relation: implicit
      description: verify current directory

    # ── Path discovery → file operations ──
    - source_tool: ls
      target_tool: cat
      relation: implicit
      description: list files then read content
    - source_tool: ls
      target_tool: stat
      relation: implicit
      description: list files then check metadata
    - source_tool: ls
      target_tool: chmod
      relation: implicit
      description: list files then change permissions
    - source_tool: ls
      target_tool: mv
      relation: implicit
      description: list files then move
    - source_tool: ls
      target_tool: cp
      relation: implicit
      description: list files then copy
    - source_tool: ls
      target_tool: rm
      relation: implicit
      description: list files then remove

    # ── File read → advanced ops ──
    - source_tool: cat
      target_tool: mv
      relation: implicit
      description: examine content before moving
    - source_tool: cat
      target_tool: cp
      relation: implicit
      description: examine content before copying
    - source_tool: cat
      target_tool: head
      relation: implicit
      description: read full then preview top
    - source_tool: cat
      target_tool: tail
      relation: implicit
      description: read full then preview bottom
    - source_tool: cat
      target_tool: wc
      relation: implicit
      description: examine then count
    - source_tool: cat
      target_tool: grep
      relation: implicit
      description: examine then search
    - source_tool: cat
      target_tool: sort
      relation: implicit
      description: read then sort
    - source_tool: cat
      target_tool: uniq
      relation: implicit
      description: read then deduplicate
    - source_tool: cat
      target_tool: cut
      relation: implicit
      description: read then extract fields
    - source_tool: cat
      target_tool: sed
      relation: implicit
      description: read then transform
    - source_tool: cat
      target_tool: awk
      relation: implicit
      description: read then process
    - source_tool: cat
      target_tool: md5sum
      relation: implicit
      description: read then checksum
    - source_tool: cat
      target_tool: sha256sum
      relation: implicit
      description: read then verify integrity

    # ── Create files ──
    - source_tool: touch
      target_tool: cat
      relation: implicit
      description: create then read
    - source_tool: touch
      target_tool: stat
      relation: implicit
      description: create then check metadata
    - source_tool: touch
      target_tool: chmod
      relation: implicit
      description: create then set permissions
    - source_tool: touch
      target_tool: md5sum
      relation: implicit
      description: create then checksum
    - source_tool: mkdir
      target_tool: cd
      relation: implicit
      description: create directory then enter
    - source_tool: mkdir
      target_tool: touch
      relation: implicit
      description: create directory then file inside
    - source_tool: mkdir
      target_tool: ls
      relation: implicit
      description: create then verify directory exists

    # ── Move / copy → verify ──
    - source_tool: mv
      target_tool: ls
      relation: implicit
      description: move then verify new location
    - source_tool: mv
      target_tool: cat
      relation: implicit
      description: move then verify content
    - source_tool: cp
      target_tool: cat
      relation: implicit
      description: copy then verify content
    - source_tool: cp
      target_tool: ls
      relation: implicit
      description: copy then verify exists

    # ── Links ──
    - source_tool: touch
      target_tool: symlink
      relation: implicit
      description: create file then symlink it
    - source_tool: symlink
      target_tool: readlink
      relation: implicit
      description: create symlink then resolve target
    - source_tool: symlink
      target_tool: cat
      relation: implicit
      description: symlink then read through link

    # ── Search → consume ──
    - source_tool: find
      target_tool: cat
      relation: implicit
      description: find files then read
    - source_tool: find
      target_tool: stat
      relation: implicit
      description: find files then check metadata
    - source_tool: grep
      target_tool: cat
      relation: implicit
      description: search then read matched file
    - source_tool: tree
      target_tool: ls
      relation: implicit
      description: view structure then list

    # ── Stats → actions ──
    - source_tool: stat
      target_tool: chmod
      relation: implicit
      description: check permissions then change
    - source_tool: du
      target_tool: rm
      relation: implicit
      description: check usage then clean up

    # ── Cleanup ──
    - source_tool: cat
      target_tool: rm
      relation: implicit
      description: read then remove if unneeded
    - source_tool: ls
      target_tool: rm
      relation: implicit
      description: list then remove

    # ── Hex dump ──
    - source_tool: cat
      target_tool: xxd
      relation: implicit
      description: read then hex dump

    # ── Diff ──
    - source_tool: cp
      target_tool: diff
      relation: implicit
      description: copy then compare with original

query_templates:
  filesystem_nav_and_read:
    - "Navigate to the projects directory and list its contents, then read README.md."
  filesystem_create_and_move:
    - "Create a new file {filename} in /home/user, write some content, then move it to the projects directory."
  filesystem_copy_and_permissions:
    - "Copy {source} to {target}, then change the target's permissions to {mode}."

