# Email MCP Server 配置
# 邮件系统：append-only 状态，支持 inbox/threads/labels

name: email
type: local_subprocess
enabled: true

command:
  argv: ["python", "-m", "src.live_mcp.servers.email.server"]
  cwd: "."
  env:
    PYTHONUNBUFFERED: "1"

transport:
  kind: stdio
  startup_timeout_s: 20
  request_timeout_s: 10

session:
  reset_mode: deterministic_seed
  max_sessions: 64
  default_seed: 42

tools:
  discovery:
    - list_inbox
  readonly:
    - list_inbox
    - search_emails
    - get_email
    - get_thread
  mutating:
    - send_email
    - create_draft
    - add_label
    - move_to_thread

reward_profile: email_basic

dependency_graph:
  edges:
    # ── Email discovery → detail ──
    - source_tool: list_inbox
      target_tool: get_email
      relation: explicit
      source_output_path: emails[].email_id
      target_argument_path: email_id
    - source_tool: search_emails
      target_tool: get_email
      relation: explicit
      source_output_path: emails[].email_id
      target_argument_path: email_id

    # ── Email detail → operations ──
    - source_tool: get_email
      target_tool: add_label
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id
    - source_tool: get_email
      target_tool: remove_label
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id
    - source_tool: get_email
      target_tool: move_to_thread
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id
    - source_tool: get_email
      target_tool: mark_read
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id
    - source_tool: get_email
      target_tool: mark_unread
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id
    - source_tool: get_email
      target_tool: archive_email
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id
    - source_tool: get_email
      target_tool: reply_email
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id
    - source_tool: get_email
      target_tool: forward_email
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id
    - source_tool: get_email
      target_tool: get_attachments
      relation: explicit
      source_output_path: email.email_id
      target_argument_path: email_id

    # ── Thread navigation ──
    - source_tool: get_email
      target_tool: get_thread
      relation: explicit
      source_output_path: email.thread_id
      target_argument_path: thread_id
    - source_tool: move_to_thread
      target_tool: get_thread
      relation: explicit
      source_output_path: thread_id
      target_argument_path: thread_id

    # ── Listing → operations ──
    - source_tool: list_inbox
      target_tool: add_label
      relation: implicit
      description: label emails from inbox
    - source_tool: list_inbox
      target_tool: archive_email
      relation: implicit
      description: archive from inbox listing

    # ── Draft → send ──
    - source_tool: create_draft
      target_tool: send_email
      relation: implicit
      description: finalize draft into sent email

    # ── Send → verify visibility ──
    - source_tool: send_email
      target_tool: list_inbox
      relation: implicit
      description: verify sent email visible
    - source_tool: send_email
      target_tool: get_thread
      relation: implicit
      description: verify sent email in thread
    - source_tool: reply_email
      target_tool: get_thread
      relation: implicit
      description: verify reply in thread

    # ── Filter management ──
    - source_tool: list_filters
      target_tool: create_filter
      relation: implicit
      description: review filters before adding
    - source_tool: create_filter
      target_tool: list_inbox
      relation: implicit
      description: verify filter effect on inbox

query_templates:
  email_label_and_reply:
    - "Find emails from {sender} about {subject}, add label '{label}', then reply to the thread."
  email_search_and_thread:
    - "Search for emails matching '{keyword}', then move the relevant one to thread '{thread_id}'."
  email_draft_and_send:
    - "Create a draft email to {to} with subject '{subject}', then send it."

