# Live MCP 全量套件配置（10 domain，对齐 PROVE Table 2 精选子集）
# 默认 backend=replay，不会误接正式训练链路

suite_name: live_mcp_full
servers:
  - configs/live_mcp/calendar.yaml       # Productivity: calendar
  - configs/live_mcp/shopping.yaml       # Commerce: shopping
  - configs/live_mcp/banking.yaml        # Finance: banking
  - configs/live_mcp/email.yaml          # Productivity: email (append-only)
  - configs/live_mcp/filesystem.yaml     # Productivity: filesystem (deep state)
  - configs/live_mcp/payments.yaml       # Finance: payments (transactional)
  - configs/live_mcp/crm.yaml            # CRM: crm (relational)
  - configs/live_mcp/issue_tracker.yaml  # CRM: issue_tracker (workflow)
  - configs/live_mcp/team_chat.yaml      # Social: team_chat (append-only)
  - configs/live_mcp/food_delivery.yaml  # Lifestyle: food_delivery (lifecycle)

environment:
  backend: live  # live（默认 live，MCP subprocess 执行）

live:
  transport: subprocess_stdio  # stdio 子进程通信
  task_file: data/live_mcp/tasks/live_mcp_full.jsonl
  trace_dir: data/live_mcp/traces

rollout:
  max_turns: 8  # 单 episode 最大交互轮数
  max_parallel_tool_calls: 4  # 并行 tool call 上限
  observation_max_chars: 4096  # 工具返回截断长度
  stop_on_execution_error: false  # 执行错误不中断 episode

reward:
  profile: full_default
  weights:
    validity: 0.50       # R_validity  (was 0.25)
    coverage: 0.50       # R_coverage  (was 0.25)
    efficiency: 0.15     # R_efficiency  (was 0.10)
    tool_selection: 0.20 # R_name  (was 0.20)
    argument_value: 0.10 # R_arg  (was 0.20)

trace:
  output_dir: data/live_mcp/traces
  save_success: true  # 保存成功 trace
  save_failure: true  # 保存失败 trace（用于分析）
