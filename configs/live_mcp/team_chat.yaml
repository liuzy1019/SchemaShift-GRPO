# Team Chat MCP Server 配置
# 即时通讯：append-only 状态，支持 channels/messages/threads

name: team_chat
type: local_subprocess
enabled: true

command:
  argv: ["python", "-m", "src.live_mcp.servers.team_chat.server"]
  cwd: "."
  env:
    PYTHONUNBUFFERED: "1"

transport:
  kind: stdio
  startup_timeout_s: 20
  request_timeout_s: 10

session:
  reset_mode: deterministic_seed
  max_sessions: 64
  default_seed: 42

tools:
  discovery:
    - list_channels
  readonly:
    - list_channels
    - get_channel
    - get_thread
  mutating:
    - send_message
    - create_thread
    - react_message

reward_profile: team_chat_basic

dependency_graph:
  edges:
    # ── Channel discovery → operations ──
    - source_tool: list_channels
      target_tool: get_channel
      relation: explicit
      source_output_path: channels[].channel_id
      target_argument_path: channel_id
    - source_tool: list_channels
      target_tool: send_message
      relation: explicit
      source_output_path: channels[].channel_id
      target_argument_path: channel_id
    - source_tool: list_channels
      target_tool: archive_channel
      relation: explicit
      source_output_path: channels[].channel_id
      target_argument_path: channel_id

    # ── Channel → message operations ──
    - source_tool: get_channel
      target_tool: send_message
      relation: explicit
      source_output_path: channel.channel_id
      target_argument_path: channel_id
    - source_tool: get_channel
      target_tool: create_thread
      relation: implicit
      description: read channel then start thread
    - source_tool: get_channel
      target_tool: react_message
      relation: implicit
      description: read channel messages then react
    - source_tool: get_channel
      target_tool: archive_channel
      relation: implicit
      description: review channel before archive

    # ── Message → thread → reply ──
    - source_tool: send_message
      target_tool: create_thread
      relation: explicit
      source_output_path: message.message_id
      target_argument_path: message_id
    - source_tool: send_message
      target_tool: react_message
      relation: implicit
      description: send then react
    - source_tool: create_thread
      target_tool: get_thread
      relation: explicit
      source_output_path: thread.thread_id
      target_argument_path: thread_id
    - source_tool: create_thread
      target_tool: send_message
      relation: implicit
      description: create thread then reply

    # ── Search → navigate ──
    - source_tool: search_messages
      target_tool: get_channel
      relation: implicit
      description: find messages then view channel
    - source_tool: search_messages
      target_tool: send_message
      relation: implicit
      description: find context then respond

    # ── Channel lifecycle ──
    - source_tool: create_channel
      target_tool: list_channels
      relation: implicit
      description: verify new channel visible
    - source_tool: create_channel
      target_tool: send_message
      relation: implicit
      description: create channel then post first message

    # ── User → DM ──
    - source_tool: get_user_status
      target_tool: send_dm
      relation: implicit
      description: check user online before DM
    - source_tool: list_channels
      target_tool: get_user_status
      relation: implicit
      description: see members then check status

query_templates:
  team_chat_send_and_thread:
    - "Go to the {channel} channel, send a message about '{topic}', then create a thread from it."
  team_chat_read_and_react:
    - "Check the latest message in {channel} and react with '{reaction}'."
  team_chat_thread_reply:
    - "Find the thread with id '{thread_id}' in {channel} and reply to it."

