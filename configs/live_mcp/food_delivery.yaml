# Food Delivery MCP Server 配置
# 外卖配送：生命周期状态，placed->confirmed->preparing->delivering->delivered

name: food_delivery
type: local_subprocess
enabled: true

command:
  argv: ["python", "-m", "src.live_mcp.servers.food_delivery.server"]
  cwd: "."
  env:
    PYTHONUNBUFFERED: "1"

transport:
  kind: stdio
  startup_timeout_s: 20
  request_timeout_s: 10

session:
  reset_mode: deterministic_seed
  max_sessions: 64
  default_seed: 42

tools:
  discovery:
    - list_restaurants
  readonly:
    - list_restaurants
    - get_menu
    - get_order
    - list_orders
  mutating:
    - create_order
    - update_order_status
    - cancel_order

reward_profile: food_delivery_basic

dependency_graph:
  edges:
    # ── Restaurant discovery → detail ──
    - source_tool: list_restaurants
      target_tool: get_restaurant
      relation: explicit
      source_output_path: restaurants[].restaurant_id
      target_argument_path: restaurant_id
    - source_tool: list_restaurants
      target_tool: get_menu
      relation: explicit
      source_output_path: restaurants[].restaurant_id
      target_argument_path: restaurant_id
    - source_tool: search_restaurants
      target_tool: get_menu
      relation: explicit
      source_output_path: restaurants[].restaurant_id
      target_argument_path: restaurant_id
    - source_tool: get_restaurant
      target_tool: get_menu
      relation: explicit
      source_output_path: restaurant.restaurant_id
      target_argument_path: restaurant_id

    # ── Menu → order decision → place ──
    - source_tool: get_menu
      target_tool: create_order
      relation: explicit
      source_output_path: restaurant_id
      target_argument_path: restaurant_id
    - source_tool: filter_by_dietary
      target_tool: create_order
      relation: implicit
      description: filter menu by dietary needs then order
    - source_tool: get_popular_items
      target_tool: create_order
      relation: implicit
      description: browse popular items then order

    # ── Order → lifecycle ──
    - source_tool: create_order
      target_tool: get_order
      relation: explicit
      source_output_path: order.order_id
      target_argument_path: order_id
    - source_tool: create_order
      target_tool: list_orders
      relation: implicit
      description: verify new order in listing
    - source_tool: list_orders
      target_tool: get_order
      relation: explicit
      source_output_path: orders[].order_id
      target_argument_path: order_id

    # ── Order status transitions ──
    - source_tool: get_order
      target_tool: update_order_status
      relation: explicit
      source_output_path: order.order_id
      target_argument_path: order_id
    - source_tool: get_order
      target_tool: cancel_order
      relation: explicit
      source_output_path: order.order_id
      target_argument_path: order_id
    - source_tool: update_order_status
      target_tool: get_order
      relation: implicit
      description: verify status change persisted

    # ── Delivery tracking ──
    - source_tool: create_order
      target_tool: get_estimated_time
      relation: explicit
      source_output_path: order.order_id
      target_argument_path: order_id
    - source_tool: update_order_status
      target_tool: track_rider
      relation: implicit
      description: start delivering then track

    # ── Post-delivery actions ──
    - source_tool: get_order
      target_tool: rate_order
      relation: explicit
      source_output_path: order.order_id
      target_argument_path: order_id
    - source_tool: get_order
      target_tool: add_tip
      relation: explicit
      source_output_path: order.order_id
      target_argument_path: order_id

    # ── Reorder ──
    - source_tool: get_order
      target_tool: reorder
      relation: explicit
      source_output_path: order.order_id
      target_argument_path: order_id
    - source_tool: list_orders
      target_tool: reorder
      relation: explicit
      source_output_path: orders[].order_id
      target_argument_path: order_id

    # ── Support ──
    - source_tool: get_order
      target_tool: contact_support
      relation: explicit
      source_output_path: order.order_id
      target_argument_path: order_id

query_templates:
  food_delivery_order:
    - "Find a {cuisine} restaurant, check the menu, then order {items} for delivery to {address}."
  food_delivery_track:
    - "Find my most recent order and check its status."
  food_delivery_cancel:
    - "Find my most recent placed order and cancel it."

