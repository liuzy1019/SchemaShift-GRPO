# Banking MCP Server 配置
# 提供银行账户的转账、余额查询、冻结等操作

name: banking
type: local_subprocess
enabled: true

command:
  argv: ["python", "-m", "src.live_mcp.servers.banking.server"]
  cwd: "."
  env:
    PYTHONUNBUFFERED: "1"

transport:
  kind: stdio
  startup_timeout_s: 20
  request_timeout_s: 10

session:
  reset_mode: deterministic_seed
  max_sessions: 64
  default_seed: 42

tools:
  discovery:
    - get_account_info
  readonly:
    - get_balance
    - get_history
    - verify_account
    - get_account_info
  mutating:
    - transfer
    - freeze_account

reward_profile: banking_basic

dependency_graph:
  edges:
    # ── Account discovery ──
    - source_tool: list_accounts
      target_tool: get_account_info
      relation: explicit
      source_output_path: accounts[].account_id
      target_argument_path: account_id
    - source_tool: list_accounts
      target_tool: get_balance
      relation: explicit
      source_output_path: accounts[].account_id
      target_argument_path: account_id
    - source_tool: get_account_info
      target_tool: get_balance
      relation: explicit
      source_output_path: account_id
      target_argument_path: account_id

    # ── Balance check → mutations ──
    - source_tool: get_balance
      target_tool: transfer
      relation: implicit
      description: check balance before transfer
    - source_tool: get_balance
      target_tool: withdraw
      relation: implicit
      description: verify sufficient funds
    - source_tool: get_balance
      target_tool: deposit
      relation: implicit
      description: check balance before deposit
    - source_tool: get_balance
      target_tool: bill_pay
      relation: implicit
      description: verify funds before paying
    - source_tool: get_balance
      target_tool: wire_transfer
      relation: implicit
      description: verify funds including fee
    - source_tool: get_balance
      target_tool: apply_loan
      relation: implicit
      description: check collateral balance

    # ── Identity verification ──
    - source_tool: get_account_info
      target_tool: verify_account
      relation: explicit
      source_output_path: account_id
      target_argument_path: account_id
    - source_tool: verify_account
      target_tool: transfer
      relation: implicit
      description: verify recipient identity
    - source_tool: verify_account
      target_tool: wire_transfer
      relation: implicit
      description: verify external recipient

    # ── Transfer lifecycle ──
    - source_tool: transfer
      target_tool: get_history
      relation: implicit
      description: transfer should appear in history
    - source_tool: wire_transfer
      target_tool: get_history
      relation: implicit
      description: wire should appear in history
    - source_tool: schedule_transfer
      target_tool: cancel_transfer
      relation: explicit
      source_output_path: scheduled_txn_id
      target_argument_path: scheduled_txn_id
    - source_tool: cancel_transfer
      target_tool: get_history
      relation: implicit
      description: verify cancellation

    # ── Bill pay ──
    - source_tool: bill_pay
      target_tool: get_history
      relation: implicit
      description: bill payment should appear in history

    # ── Freeze cycle ──
    - source_tool: get_account_info
      target_tool: freeze_account
      relation: explicit
      source_output_path: account_id
      target_argument_path: account_id
    - source_tool: freeze_account
      target_tool: unfreeze_account
      relation: explicit
      source_output_path: account_id
      target_argument_path: account_id
    - source_tool: unfreeze_account
      target_tool: get_balance
      relation: implicit
      description: verify account accessible after unfreeze

    # ── Loan ──
    - source_tool: apply_loan
      target_tool: list_accounts
      relation: implicit
      description: verify loan-linked account

    # ── Cross-currency ──
    - source_tool: get_exchange_rate
      target_tool: transfer
      relation: implicit
      description: use exchange rate for cross-currency transfer
    - source_tool: get_exchange_rate
      target_tool: wire_transfer
      relation: implicit
      description: use exchange rate for wire

    # ── History → statements ──
    - source_tool: get_history
      target_tool: get_statement
      relation: implicit
      description: drill into statement from transactions

query_templates:
  banking_transfer:
    - "Transfer {amount} from {from_account} to {to_account}."
  banking_balance_check:
    - "What is the balance of {account_id}?"
  banking_free_and_check:
    - "Freeze {account_id} then check its status."
